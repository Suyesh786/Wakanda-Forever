<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS VR | A-Frame WebXR Interface</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        /* A loading screen while the 3D scene boots up */
        #boot-screen {
            position: fixed; inset: 0; background: #020617; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #00d4ff; font-family: monospace; font-size: 1.5rem; transition: opacity 1s;
        }
    </style>
</head>
<body>

    <div id="boot-screen">INITIALIZING CHRONOS SPATIAL OS...</div>

    <a-scene loading-screen="enabled: false" background="color: #020617">
        
        <a-assets timeout="10000">
            <img id="tex-egypt" src="https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?q=80&w=2048" crossorigin="anonymous">
            <img id="tex-rome" src="https://images.unsplash.com/photo-1552832230-c0197dd311b5?q=80&w=2048" crossorigin="anonymous">
            <img id="tex-japan" src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=2048" crossorigin="anonymous">
            <img id="tex-london" src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=2048" crossorigin="anonymous">
        </a-assets>

        <a-sky id="world-sky" src="#tex-egypt" color="#555" animation="property: rotation; to: 0 360 0; loop: true; dur: 200000; easing: linear"></a-sky>

        <a-entity id="rig" position="0 0 0">
            <a-camera position="0 1.6 0" cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-camera>
            
            <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 20" line="color: #00d4ff; opacity: 0.7"></a-entity>
            <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 20" line="color: #00d4ff; opacity: 0.7"></a-entity>
        </a-entity>

        <a-entity id="hud-container" position="0 1.5 -2.5">

            <a-plane id="holo-screen" width="1.5" height="1" position="0 0 -0.5" material="shader: flat; transparent: true; opacity: 0" visible="false">
                <a-text value="FIELD REFERENCE" position="0 0.55 0.01" align="center" width="2" color="#00d4ff"></a-text>
            </a-plane>

            <a-plane width="4" height="0.4" position="0 1.3 0" color="#020617" opacity="0.6" material="shader: flat">
                <a-text value="CHRONOS SPATIAL" position="-1.8 0 0.005" font="exo2bold" width="5" color="#00d4ff"></a-text>
                <a-text id="sys-clock" value="SYSTEM STABLE // 00:00:00" position="0.8 0 0.005" font="monoid" width="3" color="#94a3b8"></a-text>
            </a-plane>

            <a-plane width="1.2" height="2" position="-1.6 0 0.2" rotation="0 15 0" color="#020617" opacity="0.6" material="shader: flat">
                <a-text value="TIME STREAM" position="-0.5 0.8 0.005" color="#94a3b8" width="3"></a-text>
                
                <a-entity id="era-list-container" position="0 0.5 0.005"></a-entity>
            </a-plane>

            <a-plane width="1.8" height="2" position="0 0 0" color="#020617" opacity="0.4" material="shader: flat">
                <a-text id="portal-coord" value="LOC: 0.0° N, 0.0° E" position="-0.8 0.7 0.005" color="#00d4ff" width="2"></a-text>
                <a-text id="main-title" value="Loading..." position="-0.8 0.5 0.005" font="exo2bold" width="6" color="#ffffff"></a-text>
                
                <a-text id="main-desc" value="..." position="-0.8 0.1 0.005" width="1.6" wrap-count="35" color="#94a3b8" baseline="top"></a-text>
                
                <a-plane id="btn-dive" class="clickable" width="1.4" height="0.25" position="0 -0.5 0.005" color="#00d4ff"
                         animation__enter="property: scale; to: 1.05 1.05 1; startEvents: mouseenter; dur: 200"
                         animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
                    <a-text id="dive-text" value="INITIATE IMMERSION" position="0 0 0" align="center" color="#020617" font="exo2bold" width="3.5"></a-text>
                </a-plane>

                <a-plane id="btn-custom" class="clickable" width="1.4" height="0.2" position="0 -0.85 0.005" color="#6366f1"
                         animation__enter="property: scale; to: 1.05 1.05 1; startEvents: mouseenter; dur: 200"
                         animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
                    <a-text id="custom-text" value="CUSTOM TEMPORAL JUMP" position="0 0 0" align="center" color="#ffffff" font="exo2bold" width="3"></a-text>
                </a-plane>
            </a-plane>

            <a-plane width="1.2" height="2" position="1.6 0 0.2" rotation="0 -15 0" color="#020617" opacity="0.6" material="shader: flat">
                <a-entity position="0 0.5 0.1">
                    <a-dodecahedron id="artifact-mesh" radius="0.3" color="#00d4ff" wireframe="true"
                                   animation="property: rotation; to: 360 360 0; loop: true; dur: 10000; easing: linear">
                    </a-dodecahedron>
                    <a-icosahedron radius="0.15" color="#6366f1" opacity="0.8"></a-icosahedron>
                </a-entity>

                <a-text value="ACTIVE ARTIFACT" position="-0.5 -0.1 0.005" color="#00d4ff" width="2"></a-text>
                <a-text id="art-name" value="..." position="-0.5 -0.3 0.005" font="exo2bold" width="4" color="#ffffff"></a-text>
                
                <a-text value="FIELD ANALYSIS" position="-0.5 -0.6 0.005" color="#00d4ff" width="2"></a-text>
                <a-text id="art-data" value="..." position="-0.5 -0.8 0.005" width="1.1" wrap-count="25" color="#94a3b8" baseline="top"></a-text>
            </a-plane>

            <a-plane width="4" height="0.3" position="0 -1.3 0" color="#020617" opacity="0.6" material="shader: flat">
                <a-text id="year-display" value="0000 BCE" position="0 0 0.005" align="center" font="monoid" width="7" color="#00d4ff"></a-text>
            </a-plane>

        </a-entity>
    </a-scene>

    <script>
        /**
         * CHRONOS A-FRAME VR CONTROLLER
         */
        
        let DATABASE = [];
        let activeId = null;

        // --- DYNAMIC API ROUTING ---
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        
        // IMPORTANT: Replace this with your actual Render URL when deploying!
        const API_BASE = isLocal 
            ? "http://localhost:8080" 
            : "https://your-chronos-backend.onrender.com"; 

        document.querySelector('a-scene').addEventListener('loaded', initEngine);

        async function initEngine() {
            const bootScreen = document.getElementById('boot-screen');
            bootScreen.style.opacity = 0;
            setTimeout(() => bootScreen.remove(), 1000);

            try {
                const response = await fetch(`${API_BASE}/api/eras`);
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                
                DATABASE = await response.json();
                
                if (DATABASE && DATABASE.length > 0) {
                    renderEraButtons();
                    switchEra(DATABASE[0].id);
                    startTimeLoop();
                    attachInteractions();
                }
            } catch (error) {
                console.error("Chronos Server Disconnected:", error);
                document.getElementById('sys-clock').setAttribute('text', 'value: API ERROR // OFFLINE; color: #ff4757');
            }
        }

        function renderEraButtons() {
            const container = document.getElementById('era-list-container');
            container.innerHTML = ""; 
            let yOffset = 0;

            DATABASE.forEach((era) => {
                const btn = document.createElement('a-plane');
                btn.setAttribute('class', 'clickable era-btn');
                btn.setAttribute('data-id', era.id);
                btn.setAttribute('width', '1.0');
                btn.setAttribute('height', '0.25');
                btn.setAttribute('position', `0 ${yOffset} 0`);
                btn.setAttribute('color', era.id === activeId ? era.color || '#00d4ff' : '#1e293b');
                
                btn.setAttribute('animation__enter', 'property: scale; to: 1.05 1.05 1; startEvents: mouseenter; dur: 200');
                btn.setAttribute('animation__leave', 'property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200');

                const title = document.createElement('a-text');
                title.setAttribute('value', era.title);
                title.setAttribute('position', '-0.45 0.05 0.005');
                title.setAttribute('color', '#ffffff');
                title.setAttribute('width', '2.5');
                
                const sub = document.createElement('a-text');
                sub.setAttribute('value', era.year);
                sub.setAttribute('position', '-0.45 -0.05 0.005');
                sub.setAttribute('color', '#94a3b8');
                sub.setAttribute('width', '1.5');

                btn.appendChild(title);
                btn.appendChild(sub);
                container.appendChild(btn);

                yOffset -= 0.3; 
            });
        }

        function switchEra(id) {
            // Restore HUD if it was hidden by the Dive Warp
            const hud = document.getElementById('hud-container');
            if (hud.getAttribute('scale')?.x === 0) {
                hud.setAttribute('animation', 'property: scale; to: 1 1 1; dur: 1000; easing: easeOutBack');
                document.getElementById('rig').setAttribute('animation', 'property: position; to: 0 0 0; dur: 2000; easing: easeInOutQuad');
                document.getElementById('dive-text').setAttribute('value', 'INITIATE IMMERSION');
            }

            if (activeId === id && document.querySelector('#main-title').getAttribute('text').value !== 'Loading...') return;
            activeId = id;
            
            const data = DATABASE.find(d => d.id === id);
            if (!data) return;

            // 1. Update Skybox Environment
            const sky = document.getElementById('world-sky');
            const assetExists = document.getElementById(`tex-${id}`);
            
            if (assetExists) {
                sky.setAttribute('src', `#tex-${id}`);
                sky.setAttribute('color', '#555');
            } else {
                sky.removeAttribute('src');
                sky.setAttribute('color', '#020617'); // Simulation Void for custom jumps
            }

            // 2. Update Holographic Screen for Custom Jumps
            const holo = document.getElementById('holo-screen');
            if (data.wikiImage) {
                holo.setAttribute('src', data.wikiImage);
                holo.setAttribute('visible', 'true');
                holo.setAttribute('material', 'opacity', 0.9);
            } else {
                holo.setAttribute('visible', 'false');
                holo.removeAttribute('src');
            }

            // 3. Update Text Data
            document.getElementById('main-title').setAttribute('text', `value: ${data.title}`);
            document.getElementById('main-desc').setAttribute('text', `value: ${data.desc}`);
            document.getElementById('portal-coord').setAttribute('text', `value: ${data.coord}; color: ${data.color}`);
            document.getElementById('year-display').setAttribute('text', `value: ${data.year}; color: ${data.color}`);
            document.getElementById('art-name').setAttribute('text', `value: ${data.artName}`);
            document.getElementById('art-data').setAttribute('text', `value: ${data.artData}`);

            // 4. Update Colors globally
            document.getElementById('artifact-mesh').setAttribute('color', data.color);
            document.getElementById('btn-dive').setAttribute('color', data.color);

            // 5. Update Buttons
            document.querySelectorAll('.era-btn').forEach(btn => {
                if (btn.getAttribute('data-id') === id) {
                    btn.setAttribute('color', data.color); 
                } else {
                    btn.setAttribute('color', '#1e293b'); 
                }
            });
        }

        async function handleCustomJump() {
            const destination = prompt("Enter Target Era (e.g., 'Paris 1900' or 'Moon Landing 1969'):");
            if (!destination) return;

            const btnText = document.getElementById('custom-text');
            btnText.setAttribute('value', 'CALCULATING TRAJECTORY...');

            try {
                // Step 1: Ask Gemini to generate the historical context
                const response = await fetch(`${API_BASE}/api/custom-jump`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: destination })
                });
                
                if (!response.ok) throw new Error("AI Generation Failed");
                const customEra = await response.json();
                
                // Step 2: Ask Wikipedia for a Field Reference Image
                try {
                    const imgRes = await fetch(`${API_BASE}/api/wiki-image?term=${encodeURIComponent(customEra.searchTerm)}`);
                    const imgData = await imgRes.json();
                    
                    const pages = imgData.query.pages;
                    const pageId = Object.keys(pages)[0];
                    if (pages[pageId].thumbnail) {
                        // Attach the Wikipedia image URL to our Era object
                        customEra.wikiImage = pages[pageId].thumbnail.source;
                    }
                } catch (wikiErr) {
                    console.log("Could not find a Wikipedia image for this era.");
                }

                // Step 3: Add to database and warp
                DATABASE.push(customEra);
                renderEraButtons(); 
                switchEra(customEra.id);
                
                btnText.setAttribute('value', 'CUSTOM TEMPORAL JUMP');
            } catch (err) {
                console.error(err);
                alert("Temporal Drift Detected: AI could not stabilize coordinates. Check the server console logs.");
                btnText.setAttribute('value', 'CUSTOM TEMPORAL JUMP');
            }
        }

        function attachInteractions() {
            document.querySelector('#hud-container').addEventListener('click', function (evt) {
                
                // Era Selection
                if (evt.target.classList.contains('era-btn')) {
                    const id = evt.target.getAttribute('data-id');
                    switchEra(id);
                }

                // Dive Button (Aggressive Warp Animation)
                if (evt.target.id === 'btn-dive' || evt.target.parentNode.id === 'btn-dive') {
                    const hud = document.getElementById('hud-container');
                    const rig = document.getElementById('rig');
                    const text = document.getElementById('dive-text');
                    
                    text.setAttribute('value', 'WARP INITIALIZED...');
                    
                    // 1. Shrink the HUD to zero
                    hud.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 800; easing: easeInBack');
                    
                    // 2. Physically move the camera forward into the "world"
                    rig.setAttribute('animation', 'property: position; to: 0 0 -10; dur: 1500; easing: easeInQuad');

                    setTimeout(() => {
                        console.log("Immersion Mode Active.");
                    }, 1600);
                }

                // Custom Jump Button (VR Safe)
                if (evt.target.id === 'btn-custom' || evt.target.parentNode.id === 'btn-custom') {
                    const sceneEl = document.querySelector('a-scene');
                    
                    // If the user is inside the Quest 3 VR view, exit VR so they can type on the 2D browser keyboard
                    if (sceneEl.is('vr-mode')) {
                        sceneEl.exitVR();
                        setTimeout(handleCustomJump, 800);
                    } else {
                        handleCustomJump();
                    }
                }
            });
        }

        function startTimeLoop() {
            const clock = document.getElementById('sys-clock');
            setInterval(() => {
                const now = new Date();
                clock.setAttribute('text', `value: SYSTEM STABLE // ${now.toLocaleTimeString()}`);
            }, 1000);
        }
    </script>
</body>
</html>
